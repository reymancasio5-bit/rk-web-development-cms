backend:
  name: github
  repo: reymancasio5-bit/rk-web-development-cms
  branch: main
  base_url: https://decapcms.org
  auth_endpoint: /api/auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  - name: "background"
    label: "Background"
    files:
      - name: "background"
        label: "Site Background"
        file: "_data/background.json"
        fields:
          - { label: "Type", name: "type", widget: "select", options: ["image", "video"] }
          - { label: "Image or Video URL / Path", name: "src", widget: "string", hint: "Any image size works — CSS handles cropping." }

  - name: "nav"
    label: "Navigation"
    files:
      - name: "nav"
        label: "Nav Links"
        file: "_data/nav.json"
        fields:
          - label: "Links"
            name: "links"
            widget: "list"
            hint: "Last link becomes the gold CTA button automatically."
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link (href)", name: "href", widget: "string" }

  - name: "hero"
    label: "Hero Section"
    files:
      - name: "hero"
        label: "Hero"
        file: "_data/hero.json"
        fields:
          - { label: "Badge Text",      name: "badge",          widget: "string" }
          - { label: "Headline Line 1", name: "headline",       widget: "string" }
          - { label: "Headline Accent (gold)", name: "headlineAccent", widget: "string" }
          - { label: "Subtext",         name: "subtext",        widget: "text" }
          - label: "Primary Button"
            name: "ctaPrimary"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link",  name: "href",  widget: "string" }
          - label: "Secondary Button"
            name: "ctaSecondary"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link",  name: "href",  widget: "string" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            hint: "Keep to 3 stats."
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Glass Panel (right card)"
            name: "glassPanel"
            widget: "object"
            fields:
              - { label: "Tag",      name: "tag",      widget: "string" }
              - { label: "Title",    name: "title",    widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - label: "Feature Rows"
                name: "features"
                widget: "list"
                hint: "Keep to 4 rows."
                fields:
                  - { label: "Icon (fa fa-x)", name: "icon",  widget: "string" }
                  - { label: "Title",          name: "title", widget: "string" }
                  - { label: "Description",    name: "desc",  widget: "string" }
              - { label: "CTA Label", name: "ctaLabel", widget: "string" }
              - { label: "CTA Link",  name: "ctaHref",  widget: "string" }

  - name: "services"
    label: "Services"
    files:
      - name: "services"
        label: "Service Cards"
        file: "_data/services.json"
        widget: "list"
        fields:
          - { label: "Icon (fa fa-x)", name: "icon",        widget: "string" }
          - { label: "Title",          name: "title",       widget: "string" }
          - { label: "Description",    name: "description", widget: "text" }
          - label: "Feature Tags"
            name: "features"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }

  - name: "portfolio"
    label: "Portfolio / Projects"
    files:
      - name: "portfolio"
        label: "Project Cards"
        file: "_data/portfolio.json"
        widget: "list"
        hint: "Images are auto-cropped to 4:3 by CSS. Any image size is fine."
        fields:
          - { label: "Title",       name: "title",       widget: "string" }
          - { label: "Category",    name: "category",    widget: "string" }
          - { label: "Tag Badge",   name: "tag",         widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Cover Image", name: "image",       widget: "image",  required: false, hint: "Auto-cropped to 4:3 — no sizing needed." }
          - { label: "Fallback Gradient (no image)", name: "gradient", widget: "string", required: false }
          - { label: "Project URL", name: "link",        widget: "string" }

  - name: "about"
    label: "About Section"
    files:
      - name: "about"
        label: "About"
        file: "_data/about.json"
        fields:
          - { label: "Headline",    name: "headline", widget: "string" }
          - { label: "Bio",         name: "bio",      widget: "text" }
          - { label: "Years Badge", name: "yearsExp", widget: "string", hint: "e.g. 1+" }
          - { label: "Photo",       name: "photo",    widget: "image",  required: false, hint: "Auto-cropped to 4:5 portrait by CSS." }
          - label: "Highlights (4 items, 2-column grid)"
            name: "highlights"
            widget: "list"
            hint: "Keep to 4 items."
            fields:
              - { label: "Icon (fa fa-x)", name: "icon", widget: "string" }
              - { label: "Text",           name: "text", widget: "string" }

  - name: "contact"
    label: "Contact Section"
    files:
      - name: "contact"
        label: "Contact"
        file: "_data/contact.json"
        fields:
          - { label: "Headline",      name: "headline",     widget: "string" }
          - { label: "Subtext",       name: "subtext",      widget: "text" }
          - { label: "Email",         name: "email",        widget: "string" }
          - { label: "Phone",         name: "phone",        widget: "string" }
          - { label: "Booking Link",  name: "calendlyLink", widget: "string" }
          - { label: "Button Label",  name: "ctaLabel",     widget: "string" }
          - label: "Social Links"
            name: "socials"
            widget: "list"
            fields:
              - { label: "Platform", name: "platform", widget: "string" }
              - { label: "URL",      name: "href",     widget: "string" }

              - { label: "Icon",     name: "icon",     widget: "string", hint: "e.g. fa fa-linkedin" }


